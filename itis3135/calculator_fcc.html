<!DOCTYPE html>
<html lang="en">
    <head>
        <title>Mytien Hoang   ITIS-3135  Calculator </title>
        <meta name="description" content="3135 Activity">
        <meta charset="UTF-8">
        <link href="styles/calculator.css"  rel="stylesheet" type="text/css" > 
        <script src="scripts/calculator_fcc.js"></script>
    </head>
    <body>
        <div class="container">
        <p>
            ITIS-3135-Official Calculator, Mytien Hoang
        </p>
        <div class="calculator">
          <div class="calculator__display">0</div>

          <div class="calculator__keys">
            <button class="key--operator" data-action="add">+</button>
            <button class="key--operator" data-action="subtract">-</button>
            <button class="key--operator" data-action="multiply">&times;</button>
            <button class="key--operator" data-action="divide">÷</button>
            <button>7</button>
            <button>8</button>
            <button>9</button>
            <button>4</button>
            <button>5</button>
            <button>6</button>
            <button>1</button>
            <button>2</button>
            <button>3</button>
            <button>0</button>
            <button data-action="decimal">.</button>
            <button data-action="clear">AC</button>
            <button class="key--equal" data-action="calculate">=</button>
      </div>
    </div>
    </div>
        <a href="https://validator.w3.org/check?uri=referer">
        <img src="images/html_validation.png" width = "90" height = "30" alt ="Link to HTML Validator">
        </a>
        <a href="https://jigsaw.w3.org/css-validator/check/referer">
        <img src="images/css_validation.png" width = "90" height = "30" alt ="Link to CSS Validator">
        </a>
    
</body>
</html>
